version: '3.8'

services:
  discount:
    build: ./microservices/discount-service
    container_name: discount-container
    ports:
      - "8081:8080"
    environment:
      - NOTIFICATION_URL=http://notification:8080
    networks:
      - app-network
  notification:
    build: ./microservices/notification-service
    container_name: notification-container
    ports:
      - "8082:8080"
    networks:
      - app-network
networks:
  app-network:
    driver: bridge 
